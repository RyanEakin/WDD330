<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="module" crossorigin src="/assets/details-CM-fC4k2.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/utils-C00IYsSf.js">
    <link rel="stylesheet" crossorigin href="/assets/utils-9rML-OJE.css">
  </head>

  <body>
    <header id="head"></header>
    <main>
      <div class="details-card">
        <div id="details-glance">
          <!--where the details page will be dynamically generated-->
        </div>
      </div>
      <div id="comments-section">
        <h2>Comments Section</h2>
        <div class="comment-form">
          <div id="commented"></div>
          <form id="review_form">
            <div>
              <input
                type="text"
                id="commenterName"
                placeholder="user"
                required
              />
              <label><input type="radio" name="star" id="none" /></label>
              <label
                ><input type="radio" name="star" id="bah" /><img
                  class="starRate-1"
                  id="bah"
                  src="/images/star-regular-full.svg"
                  alt="1-star"
              /></label>
              <label
                ><input type="radio" name="star" id="meh" /><img
                  class="starRate-2"
                  id="meh"
                  src="/images/star-regular-full.svg"
                  alt="2-star"
              /></label>
              <label
                ><input type="radio" name="star" id="decent" /><img
                  class="starRate-3"
                  id="decent"
                  src="/images/star-regular-full.svg"
                  alt="3-star"
              /></label>
              <label
                ><input type="radio" name="star" id="good" /><img
                  class="starRate-4"
                  id="good"
                  src="/images/star-regular-full.svg"
                  alt="4-star"
              /></label>
              <label
                ><input type="radio" name="star" id="great" /><img
                  class="starRate-5"
                  id="great"
                  src="/images/star-regular-full.svg"
                  alt="5-star"
              /></label>
            </div>
            <textarea
              id="commentText"
              placeholder="Your Comment"
              required
            ></textarea>
            <button type="submit" form="review_form" id="postComment">
              Post Comment
            </button>
          </form>
        </div>
      </div>
    </main>
    <footer id="foot"></footer>
  </body>
</html>
